<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모리 게임 🧠 - 꿈꾸는3반</title>
  <meta name="description" content="꿈꾸는3반 메모리 카드 매칭 게임">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --mint: #A8E6CF;
      --pink: #FFB7C5;
      --yellow: #FFEAA7;
      --blue: #A0D2DB;
      --purple: #D5AAFF;
      --peach: #FFD4A8;
      --green: #B5EAD7;
      --bg-warm: #F5E6D3;
      --card-size: 100px;
      --card-gap: 10px;
      --border-width: 5px;
      --radius: 16px;
    }

    body {
      font-family: 'Jua', 'Gaegu', sans-serif;
      background: var(--bg-warm);
      background-image:
        radial-gradient(circle at 20% 30%, rgba(168, 230, 207, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 183, 197, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 234, 167, 0.2) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ===== SCREENS (shared) ===== */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      animation: fadeIn 0.6s ease;
      width: 100%;
    }

    .screen.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .game-title {
      font-size: 3.2rem;
      color: #5D4E6D;
      text-shadow: 3px 3px 0 rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .game-subtitle {
      font-size: 1.2rem;
      color: #8B7BA5;
      margin-bottom: 40px;
      text-align: center;
    }

    /* ===== MODE SELECTION ===== */
    .mode-buttons {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mode-btn {
      width: 220px;
      height: 260px;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-family: 'Jua', sans-serif;
      color: #5D4E6D;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1), 0 3px 10px rgba(0, 0, 0, 0.05);
    }

    .mode-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, transparent 50%);
      pointer-events: none;
    }

    .mode-btn:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    .mode-btn:active {
      transform: translateY(-2px) scale(0.98);
    }

    .mode-btn.animal {
      background: linear-gradient(145deg, #A8E6CF, #88D8B0);
    }

    .mode-btn.photo {
      background: linear-gradient(145deg, #FFB7C5, #FF9AAF);
    }

    .mode-btn .icon {
      font-size: 4.5rem;
      filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.1));
    }

    .mode-btn .label {
      font-size: 1.4rem;
    }

    .mode-btn .desc {
      font-size: 0.85rem;
      color: #6B5B7B;
      opacity: 0.8;
    }

    /* ===== DIFFICULTY SELECTION ===== */
    .diff-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }

    .diff-btn {
      width: 200px;
      padding: 25px 15px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-family: 'Jua', sans-serif;
      color: #5D4E6D;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    .diff-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.35) 0%, transparent 50%);
      pointer-events: none;
    }

    .diff-btn:hover {
      transform: translateY(-6px) scale(1.03);
    }

    .diff-btn:active {
      transform: translateY(-2px) scale(0.98);
    }

    .diff-btn.easy {
      background: linear-gradient(145deg, #B5EAD7, #96DCC0);
    }

    .diff-btn.normal {
      background: linear-gradient(145deg, #FFEAA7, #F0D78C);
    }

    .diff-btn.hard {
      background: linear-gradient(145deg, #FFB7C5, #F09DAD);
    }

    .diff-btn .diff-icon {
      font-size: 2.5rem;
    }

    .diff-btn .diff-label {
      font-size: 1.3rem;
    }

    .diff-btn .diff-info {
      font-size: 0.85rem;
      color: #6B5B7B;
      opacity: 0.8;
    }

    .back-btn {
      margin-top: 10px;
      padding: 10px 30px;
      border: 2px solid var(--pink);
      border-radius: 50px;
      background: transparent;
      color: #5D4E6D;
      font-family: 'Jua', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: var(--pink);
      color: white;
    }

    /* ===== UPLOAD ===== */
    .upload-area {
      width: 90%;
      max-width: 550px;
      border: 4px dashed var(--purple);
      border-radius: 24px;
      padding: 35px 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .upload-area:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: var(--pink);
    }

    .upload-area .icon {
      font-size: 3.5rem;
      margin-bottom: 10px;
    }

    .upload-area p {
      color: #5D4E6D;
      font-size: 1rem;
    }

    .upload-area .hint {
      font-size: 0.8rem;
      color: #9B8BA8;
      margin-top: 6px;
    }

    .upload-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 550px;
      margin: 15px 0;
    }

    .upload-preview img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 10px;
      border: 3px solid var(--mint);
    }

    .upload-next-btn {
      padding: 14px 45px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(145deg, var(--purple), #C490E4);
      color: white;
      font-family: 'Jua', sans-serif;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(180, 130, 220, 0.4);
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    .upload-next-btn:hover {
      transform: translateY(-3px);
    }

    .upload-next-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== GAME SCREEN ===== */
    .game-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      padding: 10px 25px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 1.05rem;
      color: #5D4E6D;
    }

    .stat-badge .emoji {
      font-size: 1.3rem;
    }

    .stat-badge .value {
      font-weight: bold;
      color: #7B6B8D;
    }

    .home-btn {
      padding: 7px 18px;
      border: 2px solid var(--pink);
      border-radius: 50px;
      background: transparent;
      color: #5D4E6D;
      font-family: 'Jua', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .home-btn:hover {
      background: var(--pink);
      color: white;
    }

    /* ===== CARD GRID ===== */
    .card-grid {
      display: grid;
      gap: var(--card-gap);
      perspective: 1200px;
      margin: 0 auto;
    }

    /* ===== CARD ===== */
    .card {
      width: var(--card-size);
      height: var(--card-size);
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card.matched .card-back {
      box-shadow: 0 0 18px 4px rgba(255, 215, 0, 0.5);
      filter: opacity(0.6) blur(2px);
    }

    .card.matched {
      animation: matchGlow 0.6s ease forwards;
    }

    @keyframes matchGlow {
      0% {
        transform: rotateY(180deg) scale(1);
      }

      40% {
        transform: rotateY(180deg) scale(1.13);
      }

      100% {
        transform: rotateY(180deg) scale(0.97);
      }
    }

    .card-face {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: var(--radius);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.05);
    }

    /* FRONT = 뒷면 (초기 상태, "꿈꾸는3반") */
    .card-front {
      z-index: 2;
      background: linear-gradient(145deg, #E8D5F5, #D5C0E8);
      border: var(--border-width) solid var(--card-border-color, var(--purple));
    }

    .card-front-deco {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 0.12;
      pointer-events: none;
      background-image: radial-gradient(circle, #fff 1px, transparent 1px);
      background-size: 12px 12px;
    }

    .card-front-star {
      font-size: 1.6rem;
      margin-bottom: 2px;
      filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.15));
    }

    .card-front-text {
      font-family: 'Jua', sans-serif;
      font-size: 0.72rem;
      color: #6B4F8A;
      text-align: center;
      line-height: 1.25;
      z-index: 2;
      position: relative;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.4);
    }

    /* BACK = 앞면 (클릭 시 노출, 이미지) */
    .card-back {
      transform: rotateY(180deg);
      z-index: 1;
      border: var(--border-width) solid var(--card-border-color, var(--mint));
    }

    .card-back-emoji {
      font-size: 3rem;
      filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.1));
    }

    .card-back-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: calc(var(--radius) - var(--border-width));
    }

    .card:not(.flipped):not(.matched):hover {
      transform: translateY(-4px);
    }

    .card:not(.flipped):not(.matched):hover .card-front {
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    /* Border & back-face colors */
    .border-0 {
      --card-border-color: var(--mint);
    }

    .border-1 {
      --card-border-color: var(--pink);
    }

    .border-2 {
      --card-border-color: var(--yellow);
    }

    .border-3 {
      --card-border-color: var(--blue);
    }

    .border-4 {
      --card-border-color: var(--purple);
    }

    .border-5 {
      --card-border-color: var(--peach);
    }

    .border-6 {
      --card-border-color: var(--green);
    }

    .border-0 .card-back {
      background: linear-gradient(135deg, #E0FFF0, var(--mint));
    }

    .border-1 .card-back {
      background: linear-gradient(135deg, #FFE6EC, var(--pink));
    }

    .border-2 .card-back {
      background: linear-gradient(135deg, #FFF8D6, var(--yellow));
    }

    .border-3 .card-back {
      background: linear-gradient(135deg, #D6EEF5, var(--blue));
    }

    .border-4 .card-back {
      background: linear-gradient(135deg, #EED8FF, var(--purple));
    }

    .border-5 .card-back {
      background: linear-gradient(135deg, #FFECD6, var(--peach));
    }

    .border-6 .card-back {
      background: linear-gradient(135deg, #D6F5E6, var(--green));
    }

    /* ===== PREVIEW OVERLAY ===== */
    #preview-overlay {
      display: none;
      position: fixed;
      top: 40px;
      left: 0;
      width: 100%;
      z-index: 500;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      pointer-events: none;
    }

    #preview-overlay.show {
      display: flex;
    }

    .preview-text {
      font-size: 2.5rem;
      color: #fff;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6), 0 0 20px var(--mint);
      margin-bottom: 5px;
      animation: pulse 1s infinite;
      font-weight: bold;
    }

    .preview-count {
      font-size: 5.5rem;
      color: #fff;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6), 0 0 25px var(--pink);
      animation: pulse 1s infinite;
      font-weight: bold;
      -webkit-text-stroke: 2px #5D4E6D;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }
    }

    /* ===== TOAST ===== */
    #toast-container {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 800;
      pointer-events: none;
    }

    .toast-msg {
      padding: 12px 28px;
      border-radius: 50px;
      font-family: 'Jua', sans-serif;
      font-size: 1.15rem;
      color: #5D4E6D;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      animation: toastIn 0.4s ease, toastOut 0.4s ease 1.6s forwards;
      margin-bottom: 8px;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.9);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(-15px) scale(0.9);
      }
    }

    /* ===== SPARKLE on match ===== */
    .sparkle {
      position: absolute;
      pointer-events: none;
      z-index: 100;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: sparklePop 0.7s ease forwards;
    }

    @keyframes sparklePop {
      0% {
        transform: scale(0) translate(0, 0);
        opacity: 1;
      }

      100% {
        transform: scale(1.5) translate(var(--sx), var(--sy));
        opacity: 0;
      }
    }

    /* ===== VICTORY ===== */
    #victory-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(93, 78, 109, 0.5);
      backdrop-filter: blur(5px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #victory-overlay.show {
      display: flex;
      animation: fadeIn 0.5s ease;
    }

    .victory-box {
      background: white;
      border-radius: 32px;
      padding: 45px 55px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      max-width: 90vw;
    }

    .victory-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--mint), var(--pink), var(--yellow), var(--blue), var(--purple), var(--peach), var(--green));
    }

    @keyframes popIn {
      from {
        transform: scale(0.5);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .victory-emoji {
      font-size: 4.5rem;
      margin-bottom: 12px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    .victory-title {
      font-size: 2.2rem;
      color: #5D4E6D;
      margin-bottom: 6px;
    }

    .victory-sub {
      font-size: 1.2rem;
      color: #9B7BC0;
      margin-bottom: 8px;
    }

    .victory-stats {
      font-size: 1rem;
      color: #8B7BA5;
      margin-bottom: 22px;
    }

    .victory-btn {
      padding: 13px 40px;
      border: none;
      border-radius: 50px;
      font-family: 'Jua', sans-serif;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 0 6px;
    }

    .victory-btn.restart {
      background: linear-gradient(145deg, var(--mint), #88D8B0);
      color: #3D6B50;
      box-shadow: 0 5px 15px rgba(136, 216, 176, 0.4);
    }

    .victory-btn.home-v {
      background: linear-gradient(145deg, var(--pink), #FF9AAF);
      color: #8B3A50;
      box-shadow: 0 5px 15px rgba(255, 154, 175, 0.4);
    }

    .victory-btn:hover {
      transform: translateY(-3px);
    }

    /* ===== CONFETTI ===== */
    .confetti-piece {
      position: fixed;
      z-index: 1001;
      pointer-events: none;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width:900px) {
      .game-title {
        font-size: 2.5rem;
      }
    }

    @media (max-width:600px) {
      .game-title {
        font-size: 2rem;
      }

      .mode-btn {
        width: 180px;
        height: 220px;
      }

      .mode-btn .icon {
        font-size: 3.5rem;
      }

      .mode-btn .label {
        font-size: 1.2rem;
      }

      .diff-btn {
        width: 160px;
        padding: 18px 10px;
      }

      .game-header {
        padding: 8px 14px;
        gap: 10px;
      }

      .stat-badge {
        font-size: 0.85rem;
      }

      .victory-box {
        padding: 28px 22px;
      }

      .victory-title {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>

  <!-- ===== MODE SELECTION ===== -->
  <div class="screen active" id="mode-screen">
    <div class="game-title">🧠 꿈꾸는 3반 메모리 게임</div>
    <div class="game-subtitle">카드를 뒤집어 같은 그림을 찾아보세요!</div>
    <div class="mode-buttons">
      <button class="mode-btn animal" id="btn-animal">
        <span class="icon">🐾</span><span class="label">동물 캐릭터</span><span class="desc">귀여운 동물 친구들과 함께!</span>
      </button>
      <button class="mode-btn photo" id="btn-photo">
        <span class="icon">📷</span><span class="label">내 사진</span><span class="desc">나만의 사진으로 게임하기!</span>
      </button>
    </div>
  </div>

  <!-- ===== PHOTO UPLOAD ===== -->
  <div class="screen" id="upload-screen">
    <div class="game-title" style="font-size:2rem; margin-bottom:20px;">📷 사진 업로드</div>
    <div class="upload-area" id="upload-area">
      <div class="icon">🖼️</div>
      <p>여기를 클릭하여 사진을 선택하세요</p>
      <p class="hint">1~15장의 사진을 업로드해주세요<br>(부족한 경우 반복 사용됩니다)</p>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none">
    <div class="upload-preview" id="upload-preview"></div>
    <div id="upload-count" style="color:#8B7BA5; margin-bottom:8px;"></div>
    <button class="upload-next-btn" id="upload-next-btn" disabled>다음 단계 →</button>
    <button class="back-btn" id="upload-back-btn">← 돌아가기</button>
  </div>

  <!-- ===== DIFFICULTY SELECTION ===== -->
  <div class="screen" id="diff-screen">
    <div class="game-title" style="font-size:2.2rem; margin-bottom:8px;">🎯 난이도 선택</div>
    <div class="game-subtitle" style="margin-bottom:30px;">몇 쌍의 카드로 게임할까요?</div>
    <div class="diff-buttons">
      <button class="diff-btn easy" data-pairs="5">
        <span class="diff-icon">🌱</span><span class="diff-label">쉬움</span><span class="diff-info">5쌍 · 10장 · 2×5</span>
      </button>
      <button class="diff-btn normal" data-pairs="10">
        <span class="diff-icon">🌿</span><span class="diff-label">보통</span><span class="diff-info">10쌍 · 20장 ·
          4×5</span>
      </button>
      <button class="diff-btn hard" data-pairs="15">
        <span class="diff-icon">🌳</span><span class="diff-label">어려움</span><span class="diff-info">15쌍 · 30장 ·
          5×6</span>
      </button>
    </div>
    <button class="back-btn" id="diff-back-btn">← 돌아가기</button>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div class="screen" id="game-screen">
    <div class="game-header">
      <div class="stat-badge"><span class="emoji">🃏</span><span>정답:</span><span class="value"
          id="match-display">0/5</span></div>
      <div class="stat-badge"><span class="emoji">👆</span><span>시도:</span><span class="value"
          id="tries-display">0</span></div>
      <div class="stat-badge"><span class="emoji">⏱️</span><span class="value" id="timer-display">0:00</span></div>
      <button class="home-btn" id="home-btn">🏠 처음으로</button>
    </div>
    <div class="card-grid" id="card-grid"></div>
  </div>

  <!-- ===== PREVIEW OVERLAY ===== -->
  <div id="preview-overlay">
    <div class="preview-text">잘 기억하세요! 👀</div>
    <div class="preview-count" id="preview-count">3</div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast-container"></div>

  <!-- ===== VICTORY ===== -->
  <div id="victory-overlay">
    <div class="victory-box">
      <div class="victory-emoji">🎉</div>
      <div class="victory-title">축하합니다!</div>
      <div class="victory-sub">꿈꾸는3반 친구들 최고! 🌟</div>
      <div class="victory-stats" id="victory-stats"></div>
      <div>
        <button class="victory-btn restart" id="restart-btn">🔄 다시 하기</button>
        <button class="victory-btn home-v" id="home-v-btn">🏠 처음으로</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      // ===== DATA =====
      var ANIMALS = [
        { emoji: '🐘', name: '코끼리' }, { emoji: '🦁', name: '사자' }, { emoji: '🍎', name: '사과' },
        { emoji: '☀️', name: '해' }, { emoji: '🚂', name: '기차' }, { emoji: '⭐', name: '별' },
        { emoji: '☁️', name: '구름' }, { emoji: '🐶', name: '강아지' }, { emoji: '🍕', name: '피자' },
        { emoji: '🥕', name: '당근' }, { emoji: '🐟', name: '물고기' }, { emoji: '🏠', name: '집' },
        { emoji: '🌳', name: '나무' }, { emoji: '🌻', name: '해바라기' }, { emoji: '🐥', name: '병아리' },
        { emoji: '🌸', name: '꽃' }, { emoji: '🐱', name: '고양이' }, { emoji: '🦉', name: '부엉이' },
        { emoji: '🐢', name: '거북이' }, { emoji: '🍌', name: '바나나' }
      ];

      var GRID_CONFIG = {
        5: { cols: 5, rows: 2 },
        10: { cols: 5, rows: 4 },
        15: { cols: 6, rows: 5 }
      };

      var CARD_SIZES = { 5: 110, 10: 100, 15: 85 };

      var MATCH_MESSAGES = [
        '꿈꾸는3반 친구들 최고! 🌟',
        '대단해요! ⭐',
        '잘 찾았어요! 🎯',
        '멋져요~! ✨',
        '기억력 천재! 🧠',
        '와! 정답! 🎉',
        '훌륭해요! 💫'
      ];

      // ===== STATE =====
      var state = {
        mode: '', pairs: 0, images: [], deck: [],
        first: null, second: null,
        matchCount: 0, tries: 0, processing: false,
        timer: null, seconds: 0,
        uploadedImages: []
      };

      // ===== AUDIO SYNTHESIS =====
      var audioCtx = null;
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }

      function playTone(freq, type, duration, vol, startTimeOffset) {
        if (!audioCtx) return;
        var t = audioCtx.currentTime + (startTimeOffset || 0);
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);

        gain.gain.setValueAtTime(vol, t);
        gain.gain.setTargetAtTime(0, t, duration / 3);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + duration);
      }

      function playSuccessSound() {
        initAudio();
        playTone(523.25, 'sine', 0.15, 0.3, 0);   // C5
        playTone(659.25, 'sine', 0.3, 0.3, 0.15); // E5
        playTone(783.99, 'sine', 0.4, 0.3, 0.3);  // G5
      }

      function playFailSound() {
        initAudio();
        playTone(300, 'sawtooth', 0.2, 0.1, 0);
        playTone(250, 'sawtooth', 0.3, 0.1, 0.2);
      }

      function playFanfare() {
        initAudio();
        // 5-초 짜리 승리의 빵빠레 (5-second victory fanfare)
        var notes = [
          { f: 523.25, d: 0.15, t: 0 },     // C5
          { f: 523.25, d: 0.15, t: 0.15 },  // C5
          { f: 523.25, d: 0.3, t: 0.3 },   // C5
          { f: 659.25, d: 0.4, t: 0.6 },   // E5
          { f: 587.33, d: 0.3, t: 1.0 },   // D5
          { f: 659.25, d: 0.3, t: 1.3 },   // E5
          { f: 783.99, d: 0.8, t: 1.6 },   // G5
          { f: 523.25, d: 0.2, t: 2.6 },   // C5
          { f: 659.25, d: 0.2, t: 2.8 },   // E5
          { f: 783.99, d: 0.2, t: 3.0 },   // G5
          { f: 1046.50, d: 0.2, t: 3.2 },   // C6
          // Final huge chord fading out up to 5 seconds
          { f: 523.25, d: 1.8, t: 3.5 },
          { f: 659.25, d: 1.8, t: 3.5 },
          { f: 783.99, d: 1.8, t: 3.5 },
          { f: 1046.50, d: 1.8, t: 3.5 }
        ];

        notes.forEach(function (n) {
          playTone(n.f, 'square', n.d, 0.15, n.t);
          playTone(n.f, 'sine', n.d + 0.1, 0.2, n.t);
        });
      }

      // ===== DOM =====
      var screens = {
        mode: document.getElementById('mode-screen'),
        upload: document.getElementById('upload-screen'),
        diff: document.getElementById('diff-screen'),
        game: document.getElementById('game-screen')
      };
      var $grid = document.getElementById('card-grid');
      var $matchDisplay = document.getElementById('match-display');
      var $triesDisplay = document.getElementById('tries-display');
      var $timerDisplay = document.getElementById('timer-display');
      var $victoryOverlay = document.getElementById('victory-overlay');
      var $victoryStats = document.getElementById('victory-stats');
      var $previewOverlay = document.getElementById('preview-overlay');
      var $previewCount = document.getElementById('preview-count');
      var $toastContainer = document.getElementById('toast-container');
      var $uploadPreview = document.getElementById('upload-preview');
      var $uploadCount = document.getElementById('upload-count');
      var $uploadNextBtn = document.getElementById('upload-next-btn');
      var $fileInput = document.getElementById('file-input');

      // ===== SCREENS =====
      function showScreen(key) {
        Object.keys(screens).forEach(function (k) { screens[k].classList.remove('active'); });
        screens[key].classList.add('active');
      }

      function goHome() {
        clearInterval(state.timer);
        $victoryOverlay.classList.remove('show');
        $previewOverlay.classList.remove('show');
        removeConfetti();
        showScreen('mode');
      }

      // ===== SHUFFLE =====
      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
      }

      // ===== START GAME =====
      function startGame(imageList, mode, pairs) {
        initAudio();
        var selected = shuffle(imageList).slice(0, pairs);

        var deck = [];
        for (var i = 0; i < selected.length; i++) {
          deck.push({ pairId: i, data: selected[i] });
          deck.push({ pairId: i, data: selected[i] });
        }
        deck = shuffle(deck);

        state.mode = mode;
        state.pairs = pairs;
        state.images = imageList;
        state.deck = deck;
        state.first = null;
        state.second = null;
        state.matchCount = 0;
        state.tries = 0;
        state.processing = true; // locked during preview
        state.seconds = 0;
        clearInterval(state.timer);

        showScreen('game');
        setGridSize(pairs);
        renderGrid(deck);
        updateStats();

        // Preview: show all cards face-up for 3 seconds
        requestAnimationFrame(function () {
          var cards = $grid.querySelectorAll('.card');
          for (var c = 0; c < cards.length; c++) cards[c].classList.add('flipped');
          showPreview(3);
        });
      }

      function setGridSize(pairs) {
        var cfg = GRID_CONFIG[pairs];
        var sz = CARD_SIZES[pairs];

        // Responsive: shrink if viewport is small
        var maxW = window.innerWidth - 40;
        var maxH = window.innerHeight - 120;
        var neededW = cfg.cols * (sz + 10);
        var neededH = cfg.rows * (sz + 10);
        if (neededW > maxW) sz = Math.floor((maxW - cfg.cols * 10) / cfg.cols);
        if (neededH > maxH) { var sz2 = Math.floor((maxH - cfg.rows * 10) / cfg.rows); sz = Math.min(sz, sz2); }
        sz = Math.max(sz, 40);

        document.documentElement.style.setProperty('--card-size', sz + 'px');
        var gap = sz >= 80 ? 10 : sz >= 60 ? 7 : 4;
        document.documentElement.style.setProperty('--card-gap', gap + 'px');
        document.documentElement.style.setProperty('--border-width', (sz >= 80 ? 5 : sz >= 60 ? 4 : 3) + 'px');
        document.documentElement.style.setProperty('--radius', (sz >= 80 ? 16 : sz >= 60 ? 12 : 8) + 'px');

        $grid.style.gridTemplateColumns = 'repeat(' + cfg.cols + ', var(--card-size))';
      }

      function renderGrid(deck) {
        $grid.innerHTML = '';
        for (var i = 0; i < deck.length; i++) {
          var item = deck[i];
          var colorIdx = i % 7;

          var card = document.createElement('div');
          card.className = 'card border-' + colorIdx;
          card.setAttribute('data-index', i);
          card.setAttribute('data-pair', item.pairId);

          // FRONT = 뒷면 디자인 (숫자) — 초기에 보임
          var front = document.createElement('div');
          front.className = 'card-face card-front';
          var deco = document.createElement('div');
          deco.className = 'card-front-deco';
          var text = document.createElement('div');
          text.className = 'card-front-text';
          text.style.fontSize = '2.8rem';
          text.textContent = String(i + 1);
          front.appendChild(deco);
          front.appendChild(text);

          // BACK = 앞면 (이미지) — 클릭 시 보임
          var back = document.createElement('div');
          back.className = 'card-face card-back';
          if (item.data.type === 'emoji') {
            var be = document.createElement('div');
            be.className = 'card-back-emoji';
            be.textContent = item.data.emoji;
            back.appendChild(be);
          } else {
            var img = document.createElement('img');
            img.className = 'card-back-img';
            img.src = item.data.src;
            img.alt = '카드';
            back.appendChild(img);
          }

          card.appendChild(front);
          card.appendChild(back);
          (function (el) { el.addEventListener('click', function () { onCardClick(el); }); })(card);
          $grid.appendChild(card);
        }
      }

      // ===== PREVIEW =====
      function showPreview(sec) {
        $previewOverlay.classList.add('show');
        $previewCount.textContent = sec;
        var remaining = sec;
        var iv = setInterval(function () {
          remaining--;
          if (remaining <= 0) {
            clearInterval(iv);
            $previewOverlay.classList.remove('show');
            // Flip all cards back to hide
            var cards = $grid.querySelectorAll('.card');
            for (var c = 0; c < cards.length; c++) cards[c].classList.remove('flipped');
            state.processing = false;
            startTimer();
          } else {
            $previewCount.textContent = remaining;
          }
        }, 1000);
      }

      // ===== CARD CLICK =====
      function onCardClick(card) {
        initAudio();
        if (state.processing) return;
        if (card.classList.contains('flipped')) return;
        if (card.classList.contains('matched')) return;

        card.classList.add('flipped');

        if (!state.first) {
          state.first = card;
          return;
        }

        if (!state.second) {
          state.second = card;
          state.processing = true;
          state.tries++;
          updateStats();

          var p1 = state.first.getAttribute('data-pair');
          var p2 = state.second.getAttribute('data-pair');

          if (p1 === p2) {
            playSuccessSound();
            var f = state.first, s = state.second;
            setTimeout(function () {
              f.classList.add('matched');
              s.classList.add('matched');
              spawnSparkles(f);
              spawnSparkles(s);
              state.matchCount++;
              updateStats();
              showToast(MATCH_MESSAGES[Math.floor(Math.random() * MATCH_MESSAGES.length)]);
              state.first = null;
              state.second = null;
              state.processing = false;
              if (state.matchCount === state.pairs) {
                setTimeout(showVictory, 700);
              }
            }, 400);
          } else {
            playFailSound();
            var f2 = state.first, s2 = state.second;
            setTimeout(function () {
              f2.classList.remove('flipped');
              s2.classList.remove('flipped');
              state.first = null;
              state.second = null;
              state.processing = false;
            }, 1200);
          }
        }
      }

      // ===== SPARKLES =====
      function spawnSparkles(el) {
        var rect = el.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        var cy = rect.top + rect.height / 2;
        var colors = ['#FFD700', '#FF6B9D', '#A8E6CF', '#D5AAFF', '#FF8C42', '#45B7D1'];
        for (var i = 0; i < 10; i++) {
          var sp = document.createElement('div');
          sp.className = 'sparkle';
          var angle = (Math.PI * 2 * i) / 10;
          var dist = 25 + Math.random() * 30;
          sp.style.left = cx + 'px';
          sp.style.top = cy + 'px';
          sp.style.background = colors[Math.floor(Math.random() * colors.length)];
          sp.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
          sp.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
          document.body.appendChild(sp);
          (function (s) { setTimeout(function () { s.remove(); }, 800); })(sp);
        }
      }

      // ===== TOAST =====
      function showToast(msg) {
        var t = document.createElement('div');
        t.className = 'toast-msg';
        t.textContent = msg;
        $toastContainer.appendChild(t);
        setTimeout(function () { t.remove(); }, 2200);
      }

      // ===== STATS =====
      function updateStats() {
        $matchDisplay.textContent = state.matchCount + ' / ' + state.pairs;
        $triesDisplay.textContent = state.tries;
      }

      function startTimer() {
        state.seconds = 0;
        updateTimerText();
        state.timer = setInterval(function () { state.seconds++; updateTimerText(); }, 1000);
      }

      function updateTimerText() {
        var m = Math.floor(state.seconds / 60);
        var s = state.seconds % 60;
        $timerDisplay.textContent = m + ':' + (s < 10 ? '0' : '') + s;
      }

      // ===== VICTORY =====
      function showVictory() {
        playFanfare();
        clearInterval(state.timer);
        var m = Math.floor(state.seconds / 60);
        var s = state.seconds % 60;
        $victoryStats.innerHTML = '🃏 ' + state.tries + '번 시도 &nbsp;|&nbsp; ⏱️ ' + m + '분 ' + s + '초 만에 완성!';
        $victoryOverlay.classList.add('show');
        launchConfetti();
      }

      function restartGame() {
        $victoryOverlay.classList.remove('show');
        removeConfetti();
        startGame(state.images, state.mode, state.pairs);
      }

      // ===== CONFETTI =====
      function launchConfetti() {
        var colors = ['#A8E6CF', '#FFB7C5', '#FFEAA7', '#A0D2DB', '#D5AAFF', '#FFD4A8', '#B5EAD7', '#FF6B6B', '#4ECDC4', '#45B7D1'];
        for (var i = 0; i < 80; i++) {
          var p = document.createElement('div');
          p.className = 'confetti-piece';
          p.style.left = Math.random() * 100 + 'vw';
          p.style.background = colors[Math.floor(Math.random() * colors.length)];
          p.style.width = (Math.random() * 10 + 6) + 'px';
          p.style.height = (Math.random() * 10 + 6) + 'px';
          p.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
          p.style.animationDuration = (Math.random() * 2 + 2) + 's';
          p.style.animationDelay = Math.random() * 2 + 's';
          document.body.appendChild(p);
        }
      }

      function removeConfetti() {
        var ps = document.querySelectorAll('.confetti-piece');
        for (var i = 0; i < ps.length; i++) ps[i].remove();
      }

      // ===== PHOTO UPLOAD =====
      function handleFiles(files) {
        for (var i = 0; i < files.length && state.uploadedImages.length < 15; i++) {
          if (!files[i].type.startsWith('image/')) continue;
          (function (file) {
            var r = new FileReader();
            r.onload = function (e) {
              if (state.uploadedImages.length < 15) {
                state.uploadedImages.push(e.target.result);
                refreshPreview();
              }
            };
            r.readAsDataURL(file);
          })(files[i]);
        }
      }

      function refreshPreview() {
        $uploadPreview.innerHTML = '';
        for (var i = 0; i < state.uploadedImages.length; i++) {
          var img = document.createElement('img');
          img.src = state.uploadedImages[i];
          img.alt = '사진 ' + (i + 1);
          $uploadPreview.appendChild(img);
        }
        $uploadCount.textContent = state.uploadedImages.length + '장 업로드됨';
        $uploadNextBtn.disabled = state.uploadedImages.length === 0;
      }

      // ===== INIT & PWA =====
      // 1. 자동 포커스 (Auto-focus)
      window.addEventListener('load', function () {
        var btn = document.getElementById('btn-animal');
        if (btn) btn.focus();
      });

      // 2. 서비스 워커 등록 (Service Worker caching)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').then(function (reg) {
            console.log('Service Worker registered with scope:', reg.scope);
          }).catch(function (err) {
            console.log('Service Worker registration failed:', err);
          });
        });
      }

      // ===== GO TO DIFFICULTY =====
      function goToDifficulty(mode, imageList) {
        state.mode = mode;
        state.images = imageList;
        showScreen('diff');
      }

      // ===== EVENT BINDINGS =====

      // Mode: Animal
      document.getElementById('btn-animal').addEventListener('click', function () {
        var list = [];
        for (var i = 0; i < ANIMALS.length; i++) {
          list.push({ type: 'emoji', emoji: ANIMALS[i].emoji, name: ANIMALS[i].name });
        }
        goToDifficulty('Animal', list);
      });

      // Mode: Photo
      document.getElementById('btn-photo').addEventListener('click', function () {
        state.uploadedImages = [];
        $uploadPreview.innerHTML = '';
        $uploadCount.textContent = '';
        $uploadNextBtn.disabled = true;
        showScreen('upload');
      });

      // Upload
      document.getElementById('upload-area').addEventListener('click', function () { $fileInput.click(); });
      $fileInput.addEventListener('change', function () { handleFiles(this.files); });

      $uploadNextBtn.addEventListener('click', function () {
        if (state.uploadedImages.length === 0) return;
        var list = [];
        for (var i = 0; i < 15; i++) {
          list.push({ type: 'image', src: state.uploadedImages[i % state.uploadedImages.length] });
        }
        goToDifficulty('Photo', list);
      });

      document.getElementById('upload-back-btn').addEventListener('click', goHome);

      // Difficulty
      var diffBtns = document.querySelectorAll('.diff-btn');
      for (var d = 0; d < diffBtns.length; d++) {
        (function (btn) {
          btn.addEventListener('click', function () {
            var pairs = parseInt(btn.getAttribute('data-pairs'), 10);
            startGame(state.images, state.mode, pairs);
          });
        })(diffBtns[d]);
      }

      document.getElementById('diff-back-btn').addEventListener('click', function () {
        if (state.mode === 'Photo') showScreen('upload');
        else showScreen('mode');
      });

      // Game
      document.getElementById('home-btn').addEventListener('click', goHome);
      document.getElementById('restart-btn').addEventListener('click', restartGame);
      document.getElementById('home-v-btn').addEventListener('click', goHome);

    })();
  </script>
</body>

</html>
