<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>푸른샘 시장놀이 키오스크</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="signboard">
      <h1>🧺 푸른샘 시장놀이</h1>
      <p>따뜻한 시장에 오신 걸 환영해요</p>
    </header>

    <main class="screen-wrap">
      <section class="screen active" id="screen-start">
        <h2>푸른샘 시장에 오신 것을 환영합니다</h2>
        <p class="hint">큰 버튼을 톡! 눌러서 장보기를 시작해요.</p>
        <button class="btn btn-main huge" data-go="items">시작하기 ▶</button>
      </section>

      <section class="screen" id="screen-items">
        <div class="top-row">
          <h2>물건을 골라요</h2>
          <button class="btn btn-soft" data-back="start">← 뒤로</button>
        </div>
        <div class="category-tabs" id="categoryTabs"></div>
        <div class="item-grid" id="itemGrid"></div>
        <div class="cart-float">
          <span id="cartCount">장바구니 0개</span>
          <button class="btn btn-main" id="toCart">장바구니 보기</button>
        </div>
      </section>

      <section class="screen" id="screen-cart">
        <div class="top-row">
          <h2>장바구니</h2>
          <button class="btn btn-soft" data-back="items">← 뒤로</button>
        </div>
        <div id="cartList" class="cart-list"></div>
        <div class="total-box">총액: <strong id="totalPrice">0원</strong></div>
        <div class="row-btns">
          <button class="btn btn-soft" data-go="items">다시 고르기</button>
          <button class="btn btn-main" id="toMethod">계산하기</button>
        </div>
      </section>

      <section class="screen" id="screen-method">
        <div class="top-row">
          <h2>주문 방법을 골라요</h2>
          <button class="btn btn-soft" data-back="cart">← 뒤로</button>
        </div>
        <div class="choice-grid">
          <button class="choice" data-method="매장에서 먹기">🍽️ 매장에서 먹기</button>
          <button class="choice" data-method="포장하기">🥡 포장하기</button>
          <button class="choice" data-method="배달 주문하기">🛵 배달 주문하기</button>
        </div>
      </section>

      <section class="screen" id="screen-delivery">
        <div class="top-row">
          <h2>배달 장소를 골라요</h2>
          <button class="btn btn-soft" data-back="method">← 뒤로</button>
        </div>
        <h3>어디로 보낼까요?</h3>
        <div class="choice-grid small" id="deliveryPlace"></div>
        <h3>메모를 골라요</h3>
        <div class="choice-grid small" id="deliveryMemo"></div>
        <button class="btn btn-main" id="toPayFromDelivery">결제하러 가기</button>
      </section>

      <section class="screen" id="screen-pay">
        <div class="top-row">
          <h2>결제 놀이를 해요</h2>
          <button class="btn btn-soft" data-back="method">← 뒤로</button>
        </div>
        <div class="choice-grid">
          <button class="choice" data-pay="현금">💵 현금</button>
          <button class="choice" data-pay="카드">💳 카드</button>
          <button class="choice" data-pay="쿠폰">🎟️ 쿠폰</button>
        </div>
      </section>

      <section class="screen" id="screen-done">
        <h2>🎉 계산 놀이 완료!</h2>
        <p id="orderNo"></p>
        <div class="receipt" id="receipt"></div>
        <div class="row-btns">
          <button class="btn btn-soft" id="showReceipt">영수증 보기</button>
          <button class="btn btn-main" id="goStart">처음으로</button>
        </div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
