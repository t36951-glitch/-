<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>유아 음식 주문 키오스크 (5~7세)</title>
  <style>
    :root { --bg:#fff9ef; --card:#fff; --text:#333; --main:#87ceff; --ok:#9be3b1; --warn:#ffd48a; --radius:20px; --shadow:0 8px 18px rgba(0,0,0,.09); }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; font-family:"Noto Sans KR","Apple SD Gothic Neo",sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1100px; margin:0 auto; padding:16px; }
    .header, .screen { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); }
    .header { padding:16px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
    h1 { margin:0; font-size:clamp(1.3rem,3.2vw,2rem); }
    .clock { font-weight:700; font-size:1.1rem; }
    .screen { margin-top:14px; padding:16px; }
    .steps { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
    .step { border-radius:14px; background:#f0f0f0; padding:10px; text-align:center; font-weight:700; }
    .step.active { background:var(--main); color:#fff; }
    .menu-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:10px; }
    .food { border:none; border-radius:16px; background:#f8fbff; min-height:110px; padding:10px; font-size:1.05rem; font-weight:700; cursor:pointer; }
    .food:active { transform:scale(.97); }
    .row { display:flex; flex-wrap:wrap; gap:10px; }
    .btn { border:none; border-radius:999px; padding:12px 16px; font-weight:700; cursor:pointer; font-size:1rem; }
    .btn.main { background:var(--main); color:white; }
    .btn.ok { background:var(--ok); }
    .btn.warn { background:var(--warn); }
    .summary { margin-top:12px; border:2px dashed #ddd; border-radius:16px; padding:14px; background:#fffdf8; font-size:1.05rem; line-height:1.6; }
    .hidden { display:none; }
    .pay-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
    .pay { border:none; border-radius:16px; padding:14px; min-height:90px; font-size:1.05rem; font-weight:700; cursor:pointer; background:#eef7ff; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🍽️ 유아 음식 주문 키오스크</h1>
    <div class="clock" id="clock"></div>
  </div>

  <div class="screen">
    <div class="steps">
      <div class="step active" id="s1">1. 음식 선택</div>
      <div class="step" id="s2">2. 포장/배달</div>
      <div class="step" id="s3">3. 결제 방법</div>
      <div class="step" id="s4">4. 완료</div>
    </div>

    <section id="step1">
      <h2>먹고 싶은 음식을 터치하세요</h2>
      <div class="menu-grid" id="foodGrid"></div>
      <div class="summary" id="orderSummary">아직 고른 음식이 없어요.</div>
      <div class="row" style="margin-top:12px;">
        <button class="btn warn" id="resetOrder">처음부터</button>
        <button class="btn main" id="toStep2">다음(포장/배달)</button>
      </div>
    </section>

    <section id="step2" class="hidden">
      <h2>어떻게 받을까요?</h2>
      <div class="row">
        <button class="btn ok" data-method="포장">🥡 포장</button>
        <button class="btn ok" data-method="배달">🛵 배달</button>
      </div>
      <div class="summary" id="methodSummary">아직 선택 전</div>
      <div class="row" style="margin-top:12px;">
        <button class="btn warn" id="backTo1">이전</button>
        <button class="btn main" id="toStep3">다음(결제)</button>
      </div>
    </section>

    <section id="step3" class="hidden">
      <h2>결제 방법을 선택하세요</h2>
      <div class="pay-grid">
        <button class="pay" data-pay="카드">💳 카드 결제</button>
        <button class="pay" data-pay="현금">💵 현금 결제</button>
        <button class="pay" data-pay="간편결제">📱 간편결제</button>
      </div>
      <div class="summary" id="paySummary">아직 결제 선택 전</div>
      <div class="row" style="margin-top:12px;">
        <button class="btn warn" id="backTo2">이전</button>
        <button class="btn main" id="finishOrder">주문 완료</button>
      </div>
    </section>

    <section id="step4" class="hidden">
      <h2>🎉 주문이 완료되었어요!</h2>
      <div class="summary" id="finalSummary"></div>
      <div class="row" style="margin-top:12px;">
        <button class="btn main" id="newOrder">새 주문하기</button>
      </div>
    </section>
  </div>
</div>

<script>
const foods = [
  { name:'치즈피자', price:12000, emoji:'🍕' },
  { name:'햄버거 세트', price:9500, emoji:'🍔' },
  { name:'김밥', price:4500, emoji:'🍙' },
  { name:'우동', price:7000, emoji:'🍜' },
  { name:'샐러드', price:6500, emoji:'🥗' },
  { name:'주스', price:3000, emoji:'🧃' }
];

const state = { items: [], method: '', pay: '' };
const speak = text => { const u = new SpeechSynthesisUtterance(text); u.lang='ko-KR'; speechSynthesis.cancel(); speechSynthesis.speak(u); };
const fmt = n => n.toLocaleString('ko-KR') + '원';

const foodGrid = document.getElementById('foodGrid');
foods.forEach((f, i) => {
  const b = document.createElement('button');
  b.className = 'food';
  b.innerHTML = `${f.emoji} ${f.name}<br>${fmt(f.price)}`;
  b.onclick = () => { state.items.push(i); renderSummary(); speak(`${f.name} 추가`); };
  foodGrid.appendChild(b);
});

function totalPrice(){
  return state.items.reduce((sum, idx) => sum + foods[idx].price, 0);
}
function renderSummary(){
  const box = document.getElementById('orderSummary');
  if (!state.items.length) { box.textContent = '아직 고른 음식이 없어요.'; return; }
  const names = state.items.map(i => foods[i].name).join(', ');
  box.innerHTML = `선택 음식: <b>${names}</b><br>총 금액: <b>${fmt(totalPrice())}</b>`;
}
function setStep(n){
  ['step1','step2','step3','step4'].forEach((id, i) => document.getElementById(id).classList.toggle('hidden', i !== n-1));
  ['s1','s2','s3','s4'].forEach((id, i) => document.getElementById(id).classList.toggle('active', i === n-1));
}

// step1
document.getElementById('resetOrder').onclick = () => { state.items=[]; state.method=''; state.pay=''; renderSummary(); speak('주문을 지웠어요'); };
document.getElementById('toStep2').onclick = () => {
  if (!state.items.length) { alert('음식을 먼저 선택해주세요!'); return; }
  setStep(2); speak('포장 또는 배달을 선택하세요');
};

// step2
document.querySelectorAll('[data-method]').forEach(btn => btn.onclick = () => {
  state.method = btn.dataset.method;
  document.getElementById('methodSummary').innerHTML = `수령 방법: <b>${state.method}</b>`;
  speak(`${state.method} 선택`);
});
document.getElementById('backTo1').onclick = () => setStep(1);
document.getElementById('toStep3').onclick = () => {
  if (!state.method) { alert('포장 또는 배달을 선택해주세요!'); return; }
  setStep(3); speak('결제 방법을 선택하세요');
};

// step3
document.querySelectorAll('[data-pay]').forEach(btn => btn.onclick = () => {
  state.pay = btn.dataset.pay;
  document.getElementById('paySummary').innerHTML = `결제 방법: <b>${state.pay}</b>`;
  speak(`${state.pay} 결제 선택`);
});
document.getElementById('backTo2').onclick = () => setStep(2);
document.getElementById('finishOrder').onclick = () => {
  if (!state.pay) { alert('결제 방법을 선택해주세요!'); return; }
  const names = state.items.map(i => foods[i].name).join(', ');
  document.getElementById('finalSummary').innerHTML = `
    음식: <b>${names}</b><br>
    금액: <b>${fmt(totalPrice())}</b><br>
    수령: <b>${state.method}</b><br>
    결제: <b>${state.pay}</b><br>
    주문번호: <b>#${Math.floor(Math.random()*900+100)}</b>
  `;
  setStep(4); speak('주문이 완료되었습니다');
};

// step4
document.getElementById('newOrder').onclick = () => {
  state.items=[]; state.method=''; state.pay='';
  renderSummary();
  document.getElementById('methodSummary').textContent = '아직 선택 전';
  document.getElementById('paySummary').textContent = '아직 결제 선택 전';
  setStep(1);
};

function updateClock(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
updateClock(); setInterval(updateClock, 1000); renderSummary();
</script>
</body>
</html>
